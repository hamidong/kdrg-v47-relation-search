name: Build Windows exe and publish Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: kdrg-v47
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: fixture validator 실행
        run: python tests/validate_fixture.py

      - name: GUI smoke test 실행 (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python tests/smoke_test_ui.py

      - name: 문법 검증 (py_compile)
        run: python -m py_compile main.py version.py app/__init__.py app/models.py app/data_store.py app/main_window.py app/styles.py

      - name: PyInstaller 빌드
        run: python -m PyInstaller --noconfirm --clean kdrg.spec

      - name: 배포 전 정적 검증 (exe 포함)
        run: python tests/verify_release_readiness.py

      - name: 버전 정보 추출
        id: version
        shell: bash
        run: |
          echo "app_version=$(python version.py APP_VERSION)" >> "$GITHUB_OUTPUT"
          echo "exe_name=$(python version.py EXE_NAME)" >> "$GITHUB_OUTPUT"
          echo "git_tag=$(python version.py GIT_TAG)" >> "$GITHUB_OUTPUT"
          echo "release_title=$(python version.py RELEASE_TITLE)" >> "$GITHUB_OUTPUT"

      - name: exe 경로 확인
        shell: bash
        run: |
          EXE_PATH="dist/${{ steps.version.outputs.exe_name }}"
          if [ ! -f "$EXE_PATH" ]; then
            echo "exe 파일이 존재하지 않습니다: $EXE_PATH"
            exit 1
          fi
          ls -la "$EXE_PATH"

      - name: GitHub Release 생성 및 exe 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.git_tag }}
          name: ${{ steps.version.outputs.release_title }}
          files: kdrg-v47/dist/${{ steps.version.outputs.exe_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
